name: ci
permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4

      - name: Lint
        run: mise run lint

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          outputs: type=docker,dest=image-docker.tar
          tags: pi-less-yolo:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secret-files: |
            mise_asc=./mise-release.asc

      - name: Upload image
        uses: actions/upload-artifact@v7
        with:
          name: pi-image-docker
          path: image-docker.tar
          retention-days: 1

  build-podman:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Podman has no gha cache-from/cache-to integration, so cache its storage dir directly.
      - name: Cache Podman storage
        uses: actions/cache@v4
        with:
          path: ~/.local/share/containers/storage
          key: podman-storage-${{ runner.os }}-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            podman-storage-${{ runner.os }}-

      - name: Build Podman image
        run: podman build --secret id=mise_asc,src=./mise-release.asc -t pi-less-yolo:latest .

      - name: Save image
        run: podman save -o image-podman.tar pi-less-yolo:latest

      - name: Upload image
        uses: actions/upload-artifact@v7
        with:
          name: pi-image-podman
          path: image-podman.tar
          retention-days: 1

  test-docker:
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4

      - name: Download image
        uses: actions/download-artifact@v8
        with:
          name: pi-image-docker

      - name: Load image
        run: docker load -i image-docker.tar

      - name: Test
        run: mise run test

  test-podman:
    runs-on: ubuntu-latest
    needs: build-podman
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4

      - name: Download image
        uses: actions/download-artifact@v8
        with:
          name: pi-image-podman

      - name: Load image
        run: podman load -i image-podman.tar

      - name: Test
        run: PI_CONTAINER_RUNTIME=podman mise run test
